name: Scheduled Publish

on:
  schedule:
    # 6:15 AM CST (12:15 UTC) every Monday and Thursday
    # Must run AFTER 6:00 AM CST — Hugo skips future-dated posts
    - cron: "15 12 * * 1,4"
  workflow_dispatch: # allow manual trigger

jobs:
  trigger-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push empty commit to trigger Cloudflare Pages rebuild
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "scheduled publish"
          git push
