<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if not .IsHome }}{{ .Title }} · {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="author" content="{{ .Site.Params.author }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="{{ .Site.Title }}">

  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="stylesheet" href="/css/style.css">
  {{ with .OutputFormats.Get "rss" -}}
    {{ printf `<link rel=%q type=%q href=%q title=%q>` "alternate" .MediaType.Type .Permalink $.Site.Title | safeHTML }}
  {{- end }}
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <a href="/" class="site-name">{{ .Site.Title }}</a>
      <a href="/index.xml" class="rss-link" title="RSS Feed">RSS</a>
      <div class="site-tagline">{{ .Site.Params.tagline }}</div>
    </header>

    <main>
      {{ block "main" . }}{{ end }}
    </main>
  </div>

  <footer class="site-footer">
    <div class="site-wrapper">
      &copy; {{ now.Year }} {{ .Site.Title }} · Real news, real actions
    </div>
  </footer>
</body>
</html>
